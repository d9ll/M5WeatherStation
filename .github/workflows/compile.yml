name: Build with Arduino CLI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.0

      - name: Install libraries
        run: |
          arduino-cli lib install "M5Unified"
          arduino-cli lib install "ArduinoJson"

      - name: Compile the sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:m5stick-c-plus-2 --build-property build.extra_flags="-DARDUINO_USB_CDC_ON_BOOT=1"

      - name: Upload firmware artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: M5WeatherStation-firmware
          path: |
            *.bin
            *.elf
