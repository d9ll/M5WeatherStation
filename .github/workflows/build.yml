name: 🚀 Build for M5Stick S3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: 📦 Install M5Stack core
        run: |
          arduino-cli core update-index --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json
          arduino-cli core install m5stack:esp32 --additional-urls https://static-cdn.m5stack.com/resource/arduino/package_m5stack_index.json

      - name: 📚 Install libraries
        run: |
          arduino-cli lib install "M5Unified"
          arduino-cli lib install "ArduinoJson"

      - name: 🔨 Compile firmware for M5Stick S3
        run: |
          arduino-cli compile --fqbn m5stack:esp32:m5sticks3 --build-property build.extra_flags="-DARDUINO_USB_CDC_ON_BOOT=1" --output-dir ./build

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: M5WeatherStation-S3-firmware
          path: ./build/*.bin

      - name: 📦 Prepare release files
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp ./build/*.bin release/firmware.bin
          echo "✅ Built for M5Stick S3" > release/build-info.txt

      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          name: M5WeatherStation S3 ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
