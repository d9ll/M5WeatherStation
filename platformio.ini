[env:m5stick-s3]
platform = espressif32
board = m5stack-m5stick-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_cpu = 240000000L

lib_deps = 
    m5stack/M5Unified@^0.1.0
    bblanchon/ArduinoJson@^6.21.3

build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
